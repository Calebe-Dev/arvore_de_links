<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04070e" />
    <meta name="description" content="Calebe Araujo — Software Developer. Pense diferente." />

    <script>
      (function () {
        var hour = new Date().getHours();
        var savedMode = localStorage.getItem('theme-mode');
        var mode = savedMode === 'light' || savedMode === 'dark' ? savedMode : hour >= 6 && hour < 20 ? 'light' : 'dark';
        var scene =
          mode === 'light'
            ? hour >= 17 && hour < 20
              ? 'golden'
              : 'day'
            : hour >= 0 && hour < 6
              ? 'late-night'
              : 'night';
        document.documentElement.setAttribute('data-scene', scene);
        var colors = { day: '#eaf6ff', golden: '#ffb37a', night: '#04070e', 'late-night': '#05030f' };
        document.querySelector('meta[name="theme-color"]').setAttribute('content', colors[scene]);
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Calebe Araujo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
