document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;height:120px;margin:0 auto 40px;border-radius:50%;position:relative;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0,#6ad7ff);box-shadow:0 20px 50px -12px rgba(123,90,255,0.55), 0 6px 16px rgba(0,0,0,0.2), inset 0 0 0 3px rgba(255,255,255,0.6);background-size:200% 200%;animation:shimmer 8s linear infinite;\">\n        <div style=\"position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 26%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 42%);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:24%;top:18%;width:26px;height:14px;border-radius:50%;background:rgba(255,255,255,0.65);filter:blur(2px);transform:rotate(-25deg);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h1 style=\"font-size:clamp(56px,10vw,140px);font-weight:800;letter-spacing:-0.045em;line-height:0.92;margin:0;\">Calebe&nbsp;Araujo<\u002Fh1>\n      <p style=\"font-size:clamp(21px,3vw,30px);font-weight:500;color:#424245;letter-spacing:-0.01em;margin:28px auto 0;max-width:680px;line-height:1.3;\">Penso diferente. Construo sólido.<\u002Fp>\n      <p style=\"font-size:17px;color:#86868b;margin:20px auto 0;max-width:560px;line-height:1.6;\">O sistema visual completo da marca pessoal de um desenvolvedor que une inovação e solidez. Tipografia, cor, logo, espaçamento e aplicações.<\u002Fp>\n\n      <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:44px;\">\n        <a href=\"#logo\" style=\"text-decoration:none;font-size:15px;font-weight:600;color:#fff;background:#1d1d1f;padding:13px 26px;border-radius:980px;box-shadow:0 8px 22px -8px rgba(0,0,0,0.5);\">Ver o sistema<\u002Fa>\n        <a href=\"#cores\" style=\"text-decoration:none;font-size:15px;font-weight:600;color:#1466ff;background:rgba(20,102,255,0.1);padding:13px 26px;border-radius:980px;\">Explorar a paleta<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ESSENCIA -->\n  <section id=\"essencia\" style=\"scroll-margin-top:70px;padding:130px 32px;background:#fff;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">01 — Essência<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-weight:700;letter-spacing:-0.03em;line-height:1.04;margin:0;max-width:980px;\">Uma marca que parece <span style=\"background:linear-gradient(100deg,#6ad7ff,#8b7bff,#ff8fd0);-webkit-background-clip:text;background-clip:text;color:transparent;\">inovadora<\u002Fspan>, mas se comporta de forma <span style=\"color:#1d1d1f;\">sólida.<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.6;color:#424245;max-width:760px;margin:34px 0 0;\">A identidade nasce de uma tensão produtiva: a ousadia de quem pensa diferente e a confiança de quem entrega. É clara, silenciosa e precisa — o tipo de presença que não grita, mas se impõe.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:64px;\">\n        <div style=\"background:#f5f5f7;border-radius:22px;padding:32px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-size:40px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(120deg,#1d1d1f,#6e6e73);-webkit-background-clip:text;background-clip:text;color:transparent;\">Inovador<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:#6e6e73;margin:14px 0 0;\">Curioso e contemporâneo. Busca o ângulo que ninguém viu — sem cair no exagero.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f5f5f7;border-radius:22px;padding:32px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-size:40px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(120deg,#1d1d1f,#6e6e73);-webkit-background-clip:text;background-clip:text;color:transparent;\">Sofisticado<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:#6e6e73;margin:14px 0 0;\">Refinado no detalhe. Cada pixel, cada espaço e cada palavra são intencionais.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f5f5f7;border-radius:22px;padding:32px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-size:40px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(120deg,#1d1d1f,#6e6e73);-webkit-background-clip:text;background-clip:text;color:transparent;\">Confiável<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.55;color:#6e6e73;margin:14px 0 0;\">Estável e direto. Promete o que entrega e entrega com consistência.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:72px;border-radius:28px;padding:64px 48px;text-align:center;background:radial-gradient(120% 120% at 50% 0%,#fff 0%,#f5f5f7 100%);border:1px solid rgba(0,0,0,0.06);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:#86868b;margin-bottom:24px;\">Manifesto<\u002Fdiv>\n        <p style=\"font-size:clamp(24px,3.4vw,40px);font-weight:600;letter-spacing:-0.02em;line-height:1.25;max-width:880px;margin:0 auto;color:#1d1d1f;\">\"Pense diferente\" não é atitude — é método. Questionar o óbvio, achar o ângulo que ninguém viu e, então, construir a resposta que se sustenta.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LOGO -->\n  <section id=\"logo\" style=\"scroll-margin-top:70px;padding:130px 32px;background:#f5f5f7;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">02 — Logo<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-weight:700;letter-spacing:-0.03em;line-height:1.04;margin:0;max-width:900px;\">A assinatura.<\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.6;color:#424245;max-width:720px;margin:30px 0 0;\">O logotipo principal é um wordmark em Montserrat ExtraBold, com kerning fechado. Limpo, estável e legível em qualquer escala.<\u002Fp>\n\n      <!-- Primary lockup -->\n      <div style=\"margin-top:56px;background:#fff;border-radius:28px;padding:90px 40px;text-align:center;box-shadow:0 30px 60px -30px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.04);\">\n        <div style=\"font-size:clamp(40px,7vw,92px);font-weight:800;letter-spacing:-0.045em;line-height:1;color:#1d1d1f;\">Calebe Araujo<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#86868b;margin-top:14px;text-align:center;\">Logotipo principal · Montserrat ExtraBold · tracking −4.5%<\u002Fdiv>\n\n      <!-- Variants grid -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:48px;\">\n        <div style=\"background:#fff;border-radius:22px;padding:48px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.04em;color:#1d1d1f;text-align:center;line-height:1.05;\">Calebe<br>Araujo<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#86868b;margin-top:24px;\">Empilhado · espaços estreitos<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:22px;padding:48px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <span style=\"width:46px;height:46px;border-radius:50%;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0,#6ad7ff);box-shadow:inset 0 0 0 2px rgba(255,255,255,0.6),0 6px 14px rgba(0,0,0,0.18);\"><\u002Fspan>\n            <span style=\"font-size:26px;font-weight:800;letter-spacing:-0.04em;color:#1d1d1f;\">Calebe Araujo<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#86868b;margin-top:24px;\">Com a lente · uso de destaque<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1d1d1f;border-radius:22px;padding:48px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;\">\n          <div style=\"font-size:34px;font-weight:800;letter-spacing:-0.04em;color:#f5f5f7;\">CA<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#86868b;margin-top:24px;\">Monograma · avatar / favicon<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Clear space + min size -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-top:18px;\">\n        <div style=\"background:#fff;border-radius:22px;padding:40px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-weight:700;font-size:18px;margin-bottom:8px;\">Área de proteção<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#6e6e73;line-height:1.55;margin:0 0 26px;\">Reserve no mínimo a altura do \"C\" como margem livre em todos os lados.<\u002Fp>\n          <div style=\"position:relative;background:#f5f5f7;border-radius:14px;padding:38px;display:flex;align-items:center;justify-content:center;border:1px dashed #c7c7cc;\">\n            <div style=\"position:absolute;inset:14px;border:1px dashed #1466ff;border-radius:8px;opacity:0.5;\"><\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:800;letter-spacing:-0.04em;color:#1d1d1f;\">Calebe Araujo<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:22px;padding:40px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-weight:700;font-size:18px;margin-bottom:8px;\">Tamanho mínimo<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#6e6e73;line-height:1.55;margin:0 0 26px;\">Para manter a legibilidade, nunca exiba o wordmark abaixo destes limites.<\u002Fp>\n          <div style=\"display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap;\">\n            <div style=\"text-align:center;\"><div style=\"font-size:24px;font-weight:800;letter-spacing:-0.04em;\">Calebe Araujo<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#86868b;margin-top:10px;\">Digital · 120px largura<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center;\"><div style=\"font-size:13px;font-weight:800;letter-spacing:-0.03em;\">Calebe Araujo<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#86868b;margin-top:10px;\">Impresso · 22mm<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Misuse -->\n      <div style=\"margin-top:48px;\">\n        <div style=\"font-weight:700;font-size:20px;margin-bottom:18px;\">O que não fazer<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;\">\n          <div style=\"background:#fff;border-radius:18px;padding:30px 22px;text-align:center;border:1px solid rgba(0,0,0,0.05);\">\n            <div style=\"font-size:20px;font-weight:800;letter-spacing:0.12em;color:#1d1d1f;\">Calebe Araujo<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#d93a3a;margin-top:20px;\">✕ Não espacejar as letras<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:18px;padding:30px 22px;text-align:center;border:1px solid rgba(0,0,0,0.05);\">\n            <div style=\"font-size:20px;font-weight:800;font-style:italic;color:#1d1d1f;\">Calebe Araujo<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#d93a3a;margin-top:20px;\">✕ Não inclinar nem distorcer<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border-radius:18px;padding:30px 22px;text-align:center;border:1px solid rgba(0,0,0,0.05);\">\n            <div style=\"font-size:20px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(90deg,#ff8fd0,#ffd36a);-webkit-background-clip:text;background-clip:text;color:transparent;\">Calebe Araujo<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#d93a3a;margin-top:20px;\">✕ Não colorir o wordmark<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#6ad7ff;border-radius:18px;padding:30px 22px;text-align:center;border:1px solid rgba(0,0,0,0.05);\">\n            <div style=\"font-size:20px;font-weight:800;letter-spacing:-0.04em;color:#1d1d1f;\">Calebe Araujo<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#d93a3a;margin-top:20px;\">✕ Não usar sobre cor saturada<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPLORACOES -->\n  <section style=\"scroll-margin-top:70px;padding:130px 32px;background:#fff;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">02b — Explorações<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-weight:700;letter-spacing:-0.03em;line-height:1.04;margin:0;max-width:900px;\">Direções consideradas.<\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.6;color:#424245;max-width:720px;margin:30px 0 0;\">Quatro caminhos explorados antes de chegar ao wordmark. Cada um carrega uma parte da personalidade — a direção final equilibra todos.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;margin-top:52px;\">\n        <!-- A: wordmark (chosen e=\"background:#f5f5f7;border-radius:22px;padding:0;overflow:hidden;border:1px solid rgba(0,0,0,0.06);\">\n          <div style=\"padding:64px 28px;display:flex;align-items:center;justify-content:center;min-height:180px;\">\n            <div style=\"width:92px;height:92px;border-radius:24px;background:#1d1d1f;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;letter-spacing:-0.02em;color:#fff;box-shadow:0 16px 30px -12px rgba(0,0,0,0.5);\">CA<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:22px 28px;background:#fff;border-top:1px solid rgba(0,0,0,0.06);\">\n            <div style=\"font-weight:700;font-size:15px;\">C · Selo sólido<\u002Fdiv>\n            <p style=\"font-size:13px;color:#6e6e73;margin:6px 0 0;line-height:1.5;\">Forte presença em app icon. Soa mais \"produto\" que \"pessoa\".<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- D: stacked editorial -->\n        <div style=\"background:#f5f5f7;border-radius:22px;padding:0;overflow:hidden;border:1px solid rgba(0,0,0,0.06);\">\n          <div style=\"padding:64px 28px;display:flex;align-items:center;justify-content:center;min-height:180px;text-align:center;\">\n            <div>\n              <div style=\"font-size:26px;font-weight:800;letter-spacing:-0.03em;color:#1d1d1f;line-height:1;\">CALEBE<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.42em;color:#86868b;margin-top:8px;padding-left:0.42em;\">ARAUJO<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:22px 28px;background:#fff;border-top:1px solid rgba(0,0,0,0.06);\">\n            <div style=\"font-weight:700;font-size:15px;\">D · Lockup editorial<\u002Fdiv>\n            <p style=\"font-size:13px;color:#6e6e73;margin:6px 0 0;line-height:1.5;\">Sofisticação tipográfica. Ótimo para capas e materiais longos.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CORES -->\n  <section id=\"cores\" style=\"scroll-margin-top:70px;padding:130px 32px;background:#f5f5f7;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">03 — Cores<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-weight:700;letter-spacing:-0.03em;line-height:1.04;margin:0;max-width:900px;\">Monocromático, com um espectro.<\u002Fh2>\n      <p style=\"font-size:21px;line-height:1.6;color:#424245;max-width:760px;margin:30px 0 0;\">A base é quase neutra — preto-tinta e branco-nuvem. A energia vem de um único acento e de um espectro iridescente reservado para momentos de assinatura: a \"lente\".<\u002Fp>\n\n      <!-- Core neutrals -->\n      <div style=\"font-weight:700;font-size:18px;margin:56px 0 16px;\">Neutros · a fundação<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;\">\n        <div style=\"border-radius:20px;overflow:hidden;border:1px solid rgba(0,0,0,0.06);\">\n          <div style=\"background:#1d1d1f;height:150px;\"><\u002Fdiv>\n          <div style=\"background:#fff;padding:18px 20px;\">\n            <div style=\"font-weight:700;font-size:15px;\">Ink<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#86868b;margin-top:6px;\">#1D1D1F<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:20px;overflow:hidden;border:1px solid rgba(0,0,0,0.06);\">\n          <div style=\"background:#6e6e73;height:150px;\"><\u002Fdiv>\n          <div style=\"background:#fff;padding:18px 20px;\">\n            <div style=\"font-weight:700;font-size:15px;\">Graphite<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#86868b;margin-top:6px;\">#6E6E73<\u002Fdiv>\n , o espectro da lente (inspirado nos óculos da Janis Joplin) e profundidade com sombras 3D.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px;margin-top:56px;\">\n        <!-- liquid glass card -->\n        <div style=\"border-radius:24px;padding:40px;min-height:300px;position:relative;overflow:hidden;background:linear-gradient(135deg,#8b7bff,#6ad7ff);display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 30px 60px -24px rgba(123,90,255,0.5);\">\n          <div style=\"position:absolute;top:34px;left:34px;right:34px;height:120px;border-radius:18px;background:rgba(255,255,255,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.4);box-shadow:inset 0 1px 1px rgba(255,255,255,0.6), 0 10px 30px -10px rgba(0,0,0,0.25);\"><\u002Fdiv>\n          <div style=\"position:relative;color:#fff;\">\n            <div style=\"font-weight:700;font-size:20px;\">Liquid Glass<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.5;margin:8px 0 0;opacity:0.92;\">Painéis translúcidos com blur, borda clara e brilho interno. Para navs, cards e overlays.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- the lens -->\n        <div style=\"border-radius:24px;padding:40px;min-height:300px;background:#1d1d1f;display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center;\">\n          <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n            <div style=\"width:130px;height:130px;border-radius:50%;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0,#6ad7ff);box-shadow:0 0 0 4px rgba(255,255,255,0.12),0 20px 40px -10px rgba(123,90,255,0.6),inset 0 0 0 3px rgba(255,255,255,0.5);position:relative;\">\n              <div style=\"position:absolute;left:26%;top:20%;width:30px;height:16px;border-radius:50%;background:rgba(255,255,255,0.7);filter:blur(2px);transform:rotate(-25deg);\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"color:#f5f5f7;\">\n            <div style=\"font-weight:700;font-size:20px;\">A Lente<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.5;margin:8px 0 0;color:#aeaeb2;\">O espectro circular — ver o mundo de outro ângulo. Elemento de assinatura, usado com parcimônia.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- 3D shadow -->\n        <div style=\"border-radius:24px;padding:40px;min-height:300px;background:#fff;border:1px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;justify-content:space-between;\">\n          <div style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:18px;\">\n            <div style=\"width:70px;height:70px;border-radius:20px;background:linear-gradient(145deg,#fff,#e8e8ed);box-shadow:0 30px 50px -16px rgba(0,0,0,0.4),inset 0 1px 2px rgba(255,255,255,0.9);\"><\u002Fdiv>\n            <div style=\"width:70px;height:70px;border-radius:50%;background:#1d1d1f;box-shadow:0 30px 50px -16px rgba(0,0,0,0.5),inset 0 -3px 8px rgba(255,255,255,0.12);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700;font-size:20px;\">Profundidade 3D<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.5;margin:8px 0 0;color:#6e6e73;\">Sombras suaves e longas criam elevação física. Objetos parecem flutuar sobre a superfície.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- APLICACOES -->\n  <section id=\"aplicacoes\" style=\"scroll-margin-top:70px;padding:130px 32px;background:#fff;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">07 — Aplicações<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-we er-radius:16px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 24px 44px -18px rgba(0,0,0,0.5);\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;\">\n              <span style=\"font-size:20px;font-weight:800;letter-spacing:-0.03em;color:#f5f5f7;\">Calebe Araujo<\u002Fspan>\n              <span style=\"width:24px;height:24px;border-radius:50%;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0);\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#aeaeb2;line-height:1.7;\">Software Developer<br>calebe.dev · @calebearaujo<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- LinkedIn banner -->\n        <div style=\"background:#f5f5f7;border-radius:24px;padding:40px;border:1px solid rgba(0,0,0,0.05);grid-column:1/-1;\">\n          <div style=\"font-weight:700;font-size:17px;margin-bottom:24px;\">Capa LinkedIn<\u002Fdiv>\n          <div style=\"aspect-ratio:4;border-radius:16px;overflow:hidden;position:relative;background:radial-gradient(100% 160% at 100% 0%,#8b7bff 0%,#1d1d1f 55%);display:flex;align-items:center;padding:0 56px;box-shadow:0 24px 44px -18px rgba(0,0,0,0.4);\">\n            <div style=\"position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:260px;height:260px;border-radius:50%;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0,#6ad7ff);opacity:0.85;filter:blur(2px);\"><\u002Fdiv>\n            <div style=\"position:relative;\">\n              <div style=\"font-size:clamp(22px,3.4vw,40px);font-weight:800;letter-spacing:-0.03em;color:#fff;line-height:1;\">Calebe Araujo<\u002Fdiv>\n              <div style=\"font-size:clamp(13px,1.8vw,18px);color:rgba(255,255,255,0.8);margin-top:12px;font-weight:500;\">Penso diferente. Construo sólido.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- YouTube -->\n        <div style=\"background:#f5f5f7;border-radius:24px;padding:40px;border:1px solid rgba(0,0,0,0.05);grid-column:1/-1;\">\n          <div style=\"font-weight:700;font-size:17px;margin-bottom:24px;\">Thumbnail YouTube<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;\">\n            <div style=\"aspect-ratio:1.78;border-radius:14px;overflow:hidden;background:#1d1d1f;padding:28px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 34px -16px rgba(0,0,0,0.5);\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6ad7ff;\">// dev log 01<\u002Fspan>\n              <span style=\"font-size:30px;font-weight:800;letter-spacing:-0.03em;color:#fff;line-height:1.05;\">Como eu penso<br>um sistema<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"aspect-ratio:1.78;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#8b7bff,#6ad7ff);padding:28px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 34px -16px rgba(123,90,255,0.5);\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);\">// tutorial<\u002Fspan>\n              <span style=\"font-size:30px;font-weight:800;letter-spacing:-0.03em;color:#fff;line-height:1.05;\">React do zero<br>ao deploy<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VOZ -->\n  <section style=\"scroll-margin-top:70px;padding:130px 32px;background:#f5f5f7;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#1466ff;margin-bottom:22px;\">08 — Voz &amp; Tom<\u002Fdiv>\n      <h2 style=\"font-size:clamp(34px,5.5vw,68px);font-weight:700;letter-spacing:-0.03em;line-height:1.04;margin:0;max-width:900px;\">Como a marca fala.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:56px;\">\n        <div style=\"background:#fff;border-radius:22px;padding:36px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-weight:700;font-size:18px;margin-bottom:18px;color:#30a46c;\">Sim ✓<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:15px;line-height:1.9;color:#424245;\">\n            <li>Direta e confiante<\u002Fli>\n            <li>Curiosa, mas precisa<\u002Fli>\n            <li>Técnica sem ser fria<\u002Fli>\n            <li>Frases curtas. Pausas.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:22px;padding:36px;border:1px solid rgba(0,0,0,0.05);\">\n          <div style=\"font-weight:700;font-size:18px;margin-bottom:18px;color:#d93a3a;\">Não ✕<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:15px;line-height:1.9;color:#424245;\">\n            <li>Jargão vazio ou hype<\u002Fli>\n            <li>Excesso de adjetivos<\u002Fli>\n            <li>Tom arrogante<\u002Fli>\n            <li>Emojis em excesso<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#1d1d1f;border-radius:22px;padding:36px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#86868b;margin-bottom:18px;\">Assinaturas<\u002Fdiv>\n          <p style=\"font-size:18px;font-weight:600;color:#f5f5f7;line-height:1.5;margin:0;\">\"Penso diferente.<br>Construo sólido.\"<\u002Fp>\n          <p style=\"font-size:14px;color:#aeaeb2;line-height:1.6;margin:18px 0 0;\">Use a tagline em bios e capas. Mantenha em duas linhas quando possível.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#1d1d1f;padding:90px 32px 70px;text-align:center;\">\n    <div style=\"width:56px;height:56px;border-radius:50%;margin:0 auto 28px;background:conic-gradient(from 200deg,#6ad7ff,#8b7bff,#ff8fd0,#ffd36a,#7affc0,#6ad7ff);box-shadow:inset 0 0 0 2px rgba(255,255,255,0.5),0 10px 24px -8px rgba(123,90,255,0.6);\"><\u002Fdiv>\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:-0.03em;color:#f5f5f7;\">Calebe Araujo<\u002Fdiv>\n    <p style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#86868b;margin:16px 0 0;\">Manual de Marca · v1.0 · 2026 — documento vivo<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
